<!DOCTYPE html>
<html lang="en" style="height: 100%;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - LILIA</title>

    <link rel="icon" type="image/png" href="./imgs/favicon.png?v=6">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.cdnfonts.com/css/futura-pt" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/phosphor-icons"></script>
    
    <style>
        html, body { height: 100%; margin: 0; }
        body { font-family: 'Futura PT', sans-serif; background-color: #f7f4eb; color: #2d2f31; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="flex flex-col min-h-screen">

    <!-- Mobile Navigation Overlay -->
    <div id="mobile-menu" class="hidden fixed inset-0 z-50 bg-[#f7f4eb] flex flex-col items-center justify-center space-y-8">
        <button id="close-menu-button" class="absolute top-6 right-6 text-[#a2543d]">
            <i class="ph ph-x text-4xl"></i>
        </button>
        <nav class="flex flex-col items-center space-y-6 text-2xl uppercase tracking-widest text-[#a2543d]">
            <a href="index.html">home</a>
            <a href="menu.html">menu</a>
            <a href="order.html">order</a>
            <a href="contact.html">contact</a>
        </nav>
    </div>

    <!-- Header -->
    <header class="sticky top-0 z-20 bg-[#f7f4eb] pt-3 pb-4 transition duration-200">
        <div class="max-w-7xl mx-auto px-4 relative flex flex-col items-center justify-center">
            <div class="w-full flex justify-center pb-3">
                <a href="index.html" class="block h-16 md:h-20 flex items-center justify-center">
                    <img src="./imgs/LILIA_Logo_Oxblood.png" alt="Lilia" class="h-full w-auto object-contain">
                </a>
            </div>
            <div class="absolute right-6 top-1 md:right-12 md:top-2">
                <a href="https://instagram.com/liliayyc" target="_blank" class="text-[#a2543d] hover:text-[#b07d54] p-2 transition">
                    <i class="ph ph-instagram-logo text-2xl"></i>
                </a>
            </div>
            <div class="lg:hidden absolute left-6 top-1">
                <button id="mobile-menu-button" class="text-[#a2543d] p-2">
                    <i class="ph ph-list text-3xl"></i>
                </button>
            </div>
        </div>
    </header>

    <main id="app-content" class="flex-grow">
        <!-- Title Section -->
        <section class="w-full pt-10 pb-6 text-center bg-[#f7f4eb]">
            <h1 class="text-4xl md:text-7xl font-normal tracking-[0.25em] text-[#a2543d]">Our Menu</h1>
        </section>

        <!-- Category Nav: Spanned far left to right -->
        <section class="sticky top-0 bg-[#f7f4eb] z-20">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                <nav id="category-menu-nav" class="flex justify-between items-center w-full">
                    <button onclick="handleCategoryClick(this, 'bread')" class="category-btn text-sm font-semibold tracking-widest uppercase transition-colors" style="color: #a2543d;">BREAD</button>
                    <button onclick="handleCategoryClick(this, 'viennoiserie')" class="category-btn text-sm font-normal tracking-widest uppercase transition-colors" style="color: #65615e;">VIENNOISERIE</button>
                    <button onclick="handleCategoryClick(this, 'pastry')" class="category-btn text-sm font-normal tracking-widest uppercase transition-colors" style="color: #65615e;">PASTRY</button>
                    <button onclick="handleCategoryClick(this, 'dessert')" class="category-btn text-sm font-normal tracking-widest uppercase transition-colors" style="color: #65615e;">DESSERT</button>
                    <button onclick="handleCategoryClick(this, 'sandwiches')" class="category-btn text-sm font-normal tracking-widest uppercase transition-colors" style="color: #65615e;">SANDWICHES</button>
                    <button onclick="handleCategoryClick(this, 'drink')" class="category-btn text-sm font-normal tracking-widest uppercase transition-colors" style="color: #65615e;">DRINK</button>
                </nav>
            </div>
        </section>

    </main>

<script>
    function handleCategoryClick(clickedBtn, categoryId) {
        // 1. Scroll the button into view
        clickedBtn.scrollIntoView({ 
            behavior: 'smooth', 
            block: 'nearest', 
            inline: 'center' 
        });

        // 2. Reset all buttons to default style
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.style.color = '#65615e';
            btn.style.fontWeight = '400';
        });
        
        // 3. Highlight the selected button
        clickedBtn.style.color = '#a2543d';
        clickedBtn.style.fontWeight = '600';

        // 4. Update visibility of menu content sections
        document.querySelectorAll('.menu-content').forEach(c => c.classList.add('hidden'));
        const target = document.getElementById('content-' + categoryId);
        if (target) target.classList.remove('hidden');
    }

    // --- Initialization ---
    document.addEventListener('DOMContentLoaded', () => {
        // Mobile Menu Logic
        document.getElementById('mobile-menu-button')?.addEventListener('click', () => {
            document.getElementById('mobile-menu')?.classList.remove('hidden');
        });
        
        document.getElementById('close-menu-button')?.addEventListener('click', () => {
            document.getElementById('mobile-menu')?.classList.add('hidden');
        });

        // Optional: Trigger the first category (BREAD) on load so content is visible
        const firstBtn = document.querySelector('.category-btn');
        if (firstBtn) {
            handleCategoryClick(firstBtn, 'bread');
        }
    });
</script>
</body>
</html>
